<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#144d14"/>
      <stop offset="100%" stop-color="#020702"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background, square to allow Android/iOS to mask it naturally -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  <!-- Subtle inner border -->
  <rect x="24" y="24" width="464" height="464" rx="60" fill="none" stroke="#1a7a00" stroke-width="14" opacity="0.6"/>
  <!-- Macro Prompt -->
  <g filter="url(#glow)">
    <text x="80" y="370" font-family="'Courier New', monospace" font-size="340" font-weight="bold" fill="#39ff14">></text>
    <rect x="290" y="130" width="140" height="260" fill="#39ff14"/>
  </g>
</svg>
