<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#144d14"/>
      <stop offset="100%" stop-color="#020702"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background, square to allow Android/iOS to mask it naturally -->
  <rect width="192" height="192" fill="url(#bgGrad)"/>
  <!-- Subtle inner border -->
  <rect x="8" y="8" width="176" height="176" rx="20" fill="none" stroke="#1a7a00" stroke-width="6" opacity="0.6"/>
  <!-- Macro Prompt -->
  <g filter="url(#glow)">
    <text x="30" y="138" font-family="'Courier New', monospace" font-size="124" font-weight="bold" fill="#39ff14">></text>
    <rect x="108" y="50" width="52" height="96" fill="#39ff14"/>
  </g>
</svg>
